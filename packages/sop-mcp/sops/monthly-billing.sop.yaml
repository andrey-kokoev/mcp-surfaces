sop_id: monthly-billing
title: Monthly Billing SOP
description: |
  End-to-end monthly billing procedure for Global Maxima invoices in app29.
  Covers creating monthly billing SQL and a month config file, executing and
  verifying invoice creation, using shared billing tools under billing/tools to
  materialize invoice data and generate/validate PDFs, drafting invoice emails
  from prior-month Graph Mail templates, archiving sent invoice emails, marking
  invoices sent in app29 after send confirmation, and cleaning temporary
  attachment staging files.
status: active
trigger_kind: manual
steps:
  - id: establish_run_context
    executor: operator
    blocking: true
    title: Establish billing context
    depends_on: []
    instructions: |
      Confirm and record run variables: billing_month (`YYYY-MM`),
      service_month_label, invoice_date (`YYYY-MM-DD`), prior_billing_month,
      expected invoice numbers, expected invoice count, expected invoice
      amounts, paused clients, one-off amount changes, repo root
      `D:\github\andrey-kokoev\personal`, sonar repo `D:\code\sonar.cloud`,
      and issued PDF date folder. Use explicit invoice numbers as the boundary
      for materialization, PDF generation, email drafting, archiving, and
      sent-status update.

  - id: create_month_billing_sql
    executor: agent
    blocking: true
    title: Create monthly billing SQL file
    depends_on: [establish_run_context]
    instructions: |
      Create `D:\github\andrey-kokoev\personal\billing\<billing_month> billing.pgsql`
      from the prior month billing SQL. Update invoice date, service month
      markers, invoice numbers, invoice lines, paused/added clients, and
      one-off amount changes. Keep the final sent-marker update commented out
      until emails are actually sent. Use bounded file reads/searches only.

  - id: create_month_config
    executor: agent
    blocking: true
    title: Create month billing config
    depends_on: [create_month_billing_sql]
    instructions: |
      Create `D:\github\andrey-kokoev\personal\billing\<billing_month>\billing-config.json`
      with at least `billingMonth`, `serviceMonthLabel`, `invoiceDate`,
      `priorBillingMonth`, `invoiceNumbers`, and `businessExceptions`. This file
      is the source of truth for shared materialization/PDF commands and should
      prevent manual transcription of invoice numbers across steps.

  - id: review_billing_inputs
    executor: operator
    blocking: true
    title: Review billing SQL and config
    depends_on: [create_month_config]
    instructions: |
      Review the SQL and `billing-config.json` against the confirmed run context.
      Confirm expected clients only, expected invoice count, paused clients
      excluded, special amount changes applied, invoice numbers and service
      month suffixes correct, config invoice numbers match SQL expectations,
      SQL terminators present, and sent-marker update still commented out.

  - id: execute_billing_sql
    executor: agent
    blocking: true
    title: Execute billing SQL
    depends_on: [review_billing_inputs]
    instructions: |
      Execute through Windows PowerShell and the sonar psql wrapper:

      ```powershell
      pwsh -NoProfile -File D:\code\sonar.cloud\scripts\ops\sonar-psql.ps1 -X -P pager=off -f "D:\github\andrey-kokoev\personal\billing\<billing_month> billing.pgsql"
      ```

      If execution fails, fix only the relevant monthly SQL file and rerun.
      Preserve unrelated dirty worktree changes.

  - id: verify_created_invoices
    executor: agent
    blocking: true
    title: Verify created invoices in app29
    depends_on: [execute_billing_sql]
    instructions: |
      Query app29 to verify the created invoice set using the explicit invoice
      numbers from `billing-config.json`:

      ```powershell
      pwsh -NoProfile -File D:\code\sonar.cloud\scripts\ops\sonar-psql.ps1 -X -P pager=off -c "select id, invoice_number, customer_company_name, invoice_date, invoice_sent_on, amount from app29.outgoing_invoices__view where invoice_number in ('<invoice_number_1>','<invoice_number_2>') order by invoice_number;"
      ```

      Confirm row count, customers, amounts, invoice date, and that
      `invoice_sent_on` is still null before email send.

  - id: materialize_invoice_data
    executor: agent
    blocking: true
    title: Materialize invoice data with shared tool
    depends_on: [verify_created_invoices]
    instructions: |
      Use the shared materializer with the month config:

      ```powershell
      pwsh -NoProfile -File .\billing\tools\materialize-and-open.ps1 -ConfigPath .\billing\<billing_month>\billing-config.json -NoOpen
      ```

      This writes `billing\<billing_month>\invoices-data.js` using
      `billing\tools\materialize_invoices.pgsql`, scoped by explicit invoice
      numbers and invoice date. The month folder should contain config,
      materialized data, and optional wrappers/notes, not private copies of
      shared renderer/validator scripts.

  - id: generate_invoice_pdfs
    executor: agent
    blocking: true
    title: Generate PDFs with shared tool
    depends_on: [materialize_invoice_data]
    instructions: |
      Use the shared PDF generator with the month config:

      ```powershell
      pwsh -NoProfile -File .\billing\tools\save-pdfs.ps1 -ConfigPath .\billing\<billing_month>\billing-config.json
      ```

      The tool uses `billing\tools\invoice-renderer.html`, materializes unless
      skipped, prints each invoice with headless Edge/Chrome, writes PDFs to
      `C:\Users\Andrey\OneDrive - Global Maxima LLC\!Business\!Global Maxima LLC\Issued invoices\YYYYMMDD`,
      and invokes the shared validator.

  - id: validate_invoice_pdfs
    executor: agent
    blocking: true
    title: Validate generated PDFs
    depends_on: [generate_invoice_pdfs]
    instructions: |
      If validation needs to be run separately, use:

      ```powershell
      python .\billing\tools\validate-pdfs.py --data .\billing\<billing_month>\invoices-data.js --pdf-dir "C:\Users\Andrey\OneDrive - Global Maxima LLC\!Business\!Global Maxima LLC\Issued invoices\YYYYMMDD"
      ```

      Validation checks file presence, plausible size, PDF header, page count,
      invoice number, customer name, line titles, and USD amounts. Do not draft
      or send emails until validation passes.

  - id: inspect_prior_month_email_templates
    executor: agent
    blocking: true
    title: Inspect prior month email templates
    depends_on: [validate_invoice_pdfs]
    instructions: |
      Use Graph Mail MCP to find `Outgoing invoices/<prior_billing_month>` and
      inspect its sent invoice messages as templates. Use bounded folder/message
      queries and read subject, recipients, body, attachment presence, and sent
      time. Preserve recipient patterns and concise wording while updating
      month/year and invoice identifiers. Omit paused clients and keep
      combined-customer emails combined when prior month did so.

  - id: create_invoice_email_drafts
    executor: agent
    blocking: true
    title: Create invoice email drafts
    depends_on: [inspect_prior_month_email_templates]
    instructions: |
      Create Graph Mail drafts only; do not send from the agent unless explicitly
      requested and policy permits it. Attach the exact current PDFs. If Graph
      Mail file upload only allows `C:\Users\Andrey\Narada`, copy PDFs to
      `C:\Users\Andrey\Narada\attachments\invoice-drafts\YYYYMMDD` and attach
      from there. Verify each draft in Drafts with bounded fields:
      `id,subject,toRecipients,hasAttachments,bodyPreview,lastModifiedDateTime`.

  - id: operator_send_confirmation
    executor: operator
    blocking: true
    title: Send invoice emails
    depends_on: [create_invoice_email_drafts]
    instructions: |
      Operator reviews Outlook drafts, confirms recipients, bodies, and
      attachments, then sends the emails. Record sent timestamp and manual edits.
      Do not mark invoices sent in app29 until this step is confirmed complete.

  - id: archive_sent_invoice_emails
    executor: agent
    blocking: true
    title: Archive sent emails into month folder
    depends_on: [operator_send_confirmation]
    instructions: |
      Use Graph Mail MCP to create `Outgoing invoices/<billing_month>` if absent,
      then move the sent invoice emails into it. Query recent Sent Items with
      bounded limit and fields `id,subject,toRecipients,hasAttachments,sentDateTime`;
      match exactly the sent invoice subjects; move with `confirm_write: true`;
      verify the target folder contains the expected message count, subjects,
      recipients, sent timestamps, and `hasAttachments: true`.

  - id: mark_invoices_sent_in_app29
    executor: agent
    blocking: true
    title: Mark invoices sent in app29
    depends_on: [archive_sent_invoice_emails]
    instructions: |
      After sent emails are confirmed and archived, update by explicit invoice
      number list from `billing-config.json`:

      ```powershell
      pwsh -NoProfile -File D:\code\sonar.cloud\scripts\ops\sonar-psql.ps1 -X -P pager=off -c "update app29.outgoing_invoices set invoice_sent_on = date '<invoice_date>' where invoice_number in ('<invoice_number_1>','<invoice_number_2>') returning id, invoice_number, invoice_sent_on;"
      ```

      Then verify through `app29.outgoing_invoices__view`. The update row count
      must equal expected invoice count.

  - id: cleanup_attachment_staging
    executor: agent
    blocking: true
    title: Clean attachment staging files
    depends_on: [mark_invoices_sent_in_app29]
    instructions: |
      If PDFs were copied into
      `C:\Users\Andrey\Narada\attachments\invoice-drafts\YYYYMMDD` for Graph Mail
      attachment upload, verify the sent messages are archived and then delete
      or archive that temporary staging folder according to operator preference.
      Do not delete the canonical PDFs under the OneDrive issued-invoices folder.

  - id: record_completion_evidence
    executor: agent
    blocking: true
    title: Record completion evidence
    depends_on: [cleanup_attachment_staging]
    instructions: |
      Record concise completion evidence: billing SQL path, billing config path,
      shared tool command used, materialized data path, issued PDF folder,
      generated invoice numbers/amounts, PDF validation result, Graph Mail
      archive folder, sent-message subjects moved, app29 sent-status readback,
      business deviations, and follow-up improvements.

acceptance_criteria:
  - Monthly billing SQL file exists and reflects confirmed business changes
  - Month `billing-config.json` exists and contains billing month, invoice date, prior month, explicit invoice numbers, and exceptions
  - Billing SQL executed successfully through the Windows psql wrapper
  - Created invoice set in app29 exactly matches expected customers, counts, invoice numbers, dates, and amounts
  - Invoices are not marked sent before emails are actually sent
  - Invoice data is materialized by shared `billing/tools/materialize-and-open.ps1` using the month config
  - PDFs are generated by shared `billing/tools/save-pdfs.ps1` using the month config into the issued-invoices date folder
  - Shared `billing/tools/validate-pdfs.py` passes for invoice number, customer, line titles, amounts, page count, and basic PDF structure
  - Email drafts are created from prior month Graph Mail templates with correct recipients, body month, and attachments
  - Operator confirms invoice emails were sent
  - Sent invoice emails are archived into `Outgoing invoices/<billing_month>`
  - app29 invoices are marked sent only after send confirmation, using explicit invoice numbers
  - Temporary Graph attachment staging files are cleaned up or intentionally retained
  - Final readback verifies `invoice_sent_on` for the expected invoice set

evidence_requirements:
  - Run context values and business exceptions
  - Path to monthly billing SQL file and relevant diff/review notes
  - Path and contents summary for month billing config
  - psql execution output
  - app29 invoice verification query output before send
  - Shared materializer command and materialized data file path
  - PDF output folder listing
  - Shared PDF validation output
  - Draft verification query output
  - Operator send confirmation
  - Graph Mail target folder verification output
  - app29 sent-status update and readback output
  - Attachment staging cleanup decision
  - Completion notes with deviations and follow-up improvements
